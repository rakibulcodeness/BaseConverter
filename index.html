<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Universal Base Converter</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    padding:30px;
}

.container{
    max-width:700px;
    margin:auto;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    font-size:18px;
}

button{
    padding:10px 16px;
    margin:5px;
    font-size:16px;
}

#result{
    margin-top:20px;
    font-size:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

td,th{
    border:1px solid #555;
    padding:8px;
}

.hidden{
    display:none;
}

</style>
</head>

<body>

<div class="container">

<h1>Universal Base Converter</h1>

<input id="num"
placeholder="Enter number">

<input id="from"
type="number"
placeholder="From Base">

<input id="to"
type="number"
placeholder="To Base">

<button id="convertBtn">
Convert
</button>

<button id="tableBtn">
Show Digit Table
</button>

<div id="result"></div>

<div id="tableBox" class="hidden">

<table>

<thead>
<tr>
<th>Symbol</th>
<th>Value</th>
</tr>
</thead>

<tbody id="tableBody">
</tbody>

</table>

</div>

</div>

<script>

const DIGITS =
"0123456789" +
"ABCDEFGHIJKLMNOPQRSTUVWXYZ" +
"abcdefghijklmnopqrstuvwxyz" +
"!#$%&()*+,-/:;<=>?@[\\]^_`{|}~";

const MAX_BASE =
DIGITS.length;

function valueOf(ch){

const v =
DIGITS.indexOf(ch);

if(v===-1)
throw Error(
"Invalid character: " + ch
);

return v;

}

function digitOf(v){

return DIGITS[v];

}

function validate(text,base){

text =
text.replace(".","");

for(
const c
of text
){

if(
valueOf(c)
>=
base
)
return false;

}

return true;

}

function toDecimal(
text,
base
){

const parts =
text.split(".");

const int =
parts[0];

const frac =
parts[1] || "";

let total =
0;

for(
let i=0;
i<int.length;
i++
){

total +=
valueOf(
int[i]
)
*
Math.pow(
base,
int.length-i-1
);

}

for(
let i=0;
i<frac.length;
i++
){

total +=
valueOf(
frac[i]
)
*
Math.pow(
base,
-(i+1)
);

}

return total;

}

function fromDecimal(
num,
base,
precision=20
){

let int =
Math.floor(
num
);

let frac =
num-int;

let out =
"";

if(
int===0
)
out="0";

while(
int>0
){

out =
digitOf(
int%base
)
+
out;

int =
Math.floor(
int/base
);

}

if(
frac===0
)
return out;

out += ".";

for(
let i=0;
i<precision;
i++
){

frac *= base;

let d =
Math.floor(
frac
);

out +=
digitOf(d);

frac -= d;

if(
frac===0
)
break;

}

return out;

}

function showTable(base){

const body =
document.getElementById(
"tableBody"
);

body.innerHTML =
"";

for(
let i=0;
i<base;
i++
){

const row =
document.createElement(
"tr"
);

row.innerHTML =
`
<td>${DIGITS[i]}</td>
<td>${i}</td>
`;

body.appendChild(
row
);

}

}

function convert(){

try{

const num =
document
.getElementById(
"num"
)
.value
.trim();

const from =
Number(
document
.getElementById(
"from"
)
.value
);

const to =
Number(
document
.getElementById(
"to"
)
.value
);

if(
from<2||
to<2||
from>MAX_BASE||
to>MAX_BASE
)
throw Error(
"Supported bases: 2–"+MAX_BASE
);

if(
!validate(
num,
from
)
)
throw Error(
"Invalid number"
);

const dec =
toDecimal(
num,
from
);

const res =
fromDecimal(
dec,
to
);

document
.getElementById(
"result"
)
.innerHTML =
`
Decimal:
${dec}
<br><br>
Result:
${res}
`;

showTable(
Math.max(
from,
to
)
);

}
catch(e){

document
.getElementById(
"result"
)
.textContent =
e.message;

}

}

function toggleTable(){

document
.getElementById(
"tableBox"
)
.classList
.toggle(
"hidden"
);

}

document
.getElementById(
"convertBtn"
)
.onclick =
convert;

document
.getElementById(
"tableBtn"
)
.onclick =
toggleTable;

</script>

</body>
</html>
