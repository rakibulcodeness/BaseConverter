<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Universal Base Converter</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
padding:30px;
}

.container{
max-width:800px;
margin:auto;
}

input{
width:100%;
padding:12px;
margin:8px 0;
font-size:18px;
box-sizing:border-box;
}

button{
padding:12px 20px;
margin-right:10px;
font-size:16px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:22px;
word-break:break-word;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

td,th{
border:1px solid #444;
padding:8px;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<div class="container">

<h1>Universal Base Converter</h1>

<input
id="number"
placeholder="Enter number">

<input
id="fromBase"
type="number"
placeholder="From Base">

<input
id="toBase"
type="number"
placeholder="To Base">

<button id="convertBtn">
Convert
</button>

<button id="tableBtn">
Show Digit Table
</button>

<div id="result"></div>

<div
id="tableContainer"
class="hidden">

<table>

<thead>
<tr>
<th>Digit</th>
<th>Value</th>
</tr>
</thead>

<tbody id="tableBody">
</tbody>

</table>

</div>

</div>

<script>

const DIGITS =
"0123456789"+
"ABCDEFGHIJKLMNOPQRSTUVWXYZ"+
"abcdefghijklmnopqrstuvwxyz"+
"!#$%&()*+,-/:;<=>?@[\\]^_`{|}~";

const MAX_BASE =
DIGITS.length;

function valueOf(c){

const v =
DIGITS.indexOf(c);

if(v===-1){

throw new Error(
"Unknown digit: "+c
);

}

return v;

}

function digitOf(v){

return DIGITS[v];

}

function validate(
text,
base
){

text =
text.replace(
".",
""
);

for(
const c
of text
){

if(
valueOf(c)
>=
base
){

return false;

}

}

return true;

}

function toDecimal(
text,
base
){

const parts =
text.split(".");

const integer =
parts[0];

const fraction =
parts[1] || "";

let total =
0;

for(
let i=0;
i<integer.length;
i++
){

total +=
valueOf(
integer[i]
)
*
Math.pow(
base,
integer.length-i-1
);

}

for(
let i=0;
i<fraction.length;
i++
){

total +=
valueOf(
fraction[i]
)
*
Math.pow(
base,
-(i+1)
);

}

return total;

}

function fromDecimal(
number,
base,
precision=20
){

let integer =
Math.floor(
number
);

let fraction =
number-
integer;

let output =
"";

if(
integer===0
){

output =
"0";

}

while(
integer>0
){

output =
digitOf(
integer%
base
)+
output;

integer =
Math.floor(
integer/
base
);

}

if(
fraction===0
){

return output;

}

output += ".";

for(
let i=0;
i<
precision;
i++
){

fraction *=
base;

let digit =
Math.floor(
fraction
);

output +=
digitOf(
digit
);

fraction -=
digit;

if(
fraction===0
){

break;

}

}

return output;

}

function updateTable(
base
){

const body =
document
.getElementById(
"tableBody"
);

body.innerHTML =
"";

for(
let i=0;
i<base;
i++
){

const row =
document
.createElement(
"tr"
);

row.innerHTML =
`
<td>${DIGITS[i]}</td>
<td>${i}</td>
`;

body.appendChild(
row
);

}

}

function convert(){

try{

const number =
document
.getElementById(
"number"
)
.value
.trim();

const from =
Number(
document
.getElementById(
"fromBase"
)
.value
);

const to =
Number(
document
.getElementById(
"toBase"
)
.value
);

if(
from<2||
to<2||
from>
MAX_BASE||
to>
MAX_BASE
){

throw new Error(
"Supported bases: 2–"+
MAX_BASE
);

}

if(
!validate(
number,
from
)
){

throw new Error(
"Invalid number for that base"
);

}

const decimal =
toDecimal(
number,
from
);

const converted =
fromDecimal(
decimal,
to
);

document
.getElementById(
"result"
)
.innerHTML =
`
Decimal:
${decimal}
<br><br>
Result:
${converted}
`;

updateTable(
Math.max(
from,
to
)
);

}
catch(err){

document
.getElementById(
"result"
)
.textContent =
err.message;

}

}

function toggleTable(){

document
.getElementById(
"tableContainer"
)
.classList
.toggle(
"hidden"
);

}

document
.getElementById(
"convertBtn"
)
.addEventListener(
"click",
convert
);

document
.getElementById(
"tableBtn"
)
.addEventListener(
"click",
toggleTable
);

</script>

</body>

</html>
